<script> 

 // 初始化 Tippy.js，选择 sidebar 类中的所有带有 data-tippy-content 属性的元素
  const sidebarTooltips = tippy('.sidebar [data-tippy-content]');

  // 初始化其他部分的 Tippy.js 工具提示（不受影响）
  const normalTooltips = tippy('[data-tippy-content]:not(.sidebar [data-tippy-content])');
  
  

  const sidebarToggle = document.querySelector('#sidebar-toggle');

  // 监听 checkbox 状态变化
  sidebarToggle.addEventListener('change', function() {
    if (this.checked) {
      // 启用 sidebar 内的 Tippy.js 实例
      sidebarTooltips.forEach(instance => instance.enable());
    } else {
      // 禁用 sidebar 内的 Tippy.js 实例
      sidebarTooltips.forEach(instance => instance.disable());
    }
  });

  // 默认初始化时禁用 sidebar 内的工具提示
  sidebarTooltips.forEach(instance => instance.disable());

</script></body></html>
